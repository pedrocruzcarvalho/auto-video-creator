seedance:
  model: bytedance/seedance-2.0
  resolution: 720p
  aspect_ratio: "9:16"
  clip_seconds: 15
  generate_audio: true
  add_captions: true
  use_voice_reference: true
  estimated_second_usd:
    480p_first_clip: 0.08
    480p_continuation: 0.10
    720p_first_clip: 0.18
    720p_continuation: 0.22
    1080p_first_clip: 0.45
    1080p_continuation: 0.55

captions:
  alignment_model: whisper-1
  font: Arial
  font_size: 74
  margin_v: 145
  primary_color: "&H00FFFFFF"
  outline_color: "&H00111111"

channel:
  name: Exit Scenario
  handle: "@ExitScenarioTV"
  tagline: "One situation. One rule. One way out."
